<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅行のしおり</title>
    <link rel="stylesheet" href="style_mobilefix.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="map-area">
        <input
        type="text"
        id="pac-input"
        placeholder="🔍 場所を検索（例: 海遊館）"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        >
        
        <div id="map"></div>
        <button id="locate-btn" class="locate-button">📍 現在地を表示</button>
    </div>

    <div id="itinerary-area">
        <div class="area-header">
            <span>旅の予定</span>
            <div class="header-actions">
                <button type="button" id="add-manual-btn" class="header-add-btn">＋ ブロック追加</button>
                <button type="button" id="sync-btn" class="sync-button">🔄 リアルタイム同期中</button>
            </div>
        </div>

        <div class="day-tabs-bar">
            <div id="day-tabs" class="day-tabs"></div>
            <button type="button" id="add-day-btn" class="day-add-btn">＋ 日を追加</button>
        </div>

        <ul id="itinerary-list"></ul>
        <div id="total-summary" class="total-summary">この日の合計金額: 0 円 / 旅行全体: 0 円</div>
    </div>

    <div id="bottom-sheet" class="hidden">
            <div class="sheet-handle"></div>
            <button id="close-sheet">閉じる</button>
        <div class="sheet-content">
            <label>スポット名・予定名</label>
            <input type="text" id="edit-title" class="form-input" placeholder="例: 電車で移動, 旅館, 昼食">

            <label>日付タブ</label>
            <select id="edit-day" class="form-input"></select>
        
            <label>開始時刻</label>
            <input type="time" id="edit-start-time" class="form-input">
        
            <label>滞在時間（時間）</label>
            <input type="number" id="edit-duration" class="form-input" step="0.5" min="0.5">
        
            <label>ブロックの色（18色）</label>
            <div id="color-picker" class="color-picker"></div>
        
            <div class="cost-box">
                <h3>💰 入場料</h3>
                <input type="number" id="edit-entry-fee" class="form-input" step="1" min="0" placeholder="0">
            </div>
        
            <div class="cost-box">
                <h3>🛍️ 購入するアイテム</h3>
                <div id="items-list" class="cost-list"></div>
                <button type="button" id="add-item-btn" class="secondary-btn">＋ アイテムを追加</button>
            </div>
        
            <div class="cost-box">
                <h3>🍽️ 食べ物</h3>
                <div id="foods-list" class="cost-list"></div>
                <button type="button" id="add-food-btn" class="secondary-btn">＋ 食べ物を追加</button>
            </div>
        
            <div class="cost-box">
                <h3>🧾 金額の合計</h3>
                <p id="sheet-cost" class="price">合計: 0 円</p>
                <p id="sheet-cost-detail" class="cost-detail"></p>
            </div>
        
            <div class="cost-box">
                <h3>📝 メモ</h3>
                <textarea id="edit-memo" class="form-textarea" rows="3" placeholder="メモを自由に入力"></textarea>
            </div>
        
            <button id="save-spot-btn" class="primary-btn">内容を保存</button>
            <button id="delete-spot-btn" class="danger-btn">この予定を削除</button>
        </div>
    </div>
    <div id="overlay" class="hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
    }
    </script>

    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, onValue, runTransaction } from "firebase/database";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    const firebaseConfig = {
        apiKey: "AIzaSyCGoGzGK1xPZf2QY6si3qvO2k9yNnkGx_o",
        authDomain: "yows-1st-database.firebaseapp.com",
        databaseURL: "https://yows-1st-database-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yows-1st-database",
        storageBucket: "yows-1st-database.firebasestorage.app",
        messagingSenderId: "162209423635",
        appId: "1:162209423635:web:0f3e78ed371464d289fae6",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.fbDB = db;
    window.fbRef = ref;
    window.fbSet = set;
    window.fbOnValue = onValue;
    window.fbRunTransaction = runTransaction;

    signInAnonymously(auth).catch((error) => {
        console.error("認証エラー:", error);
        alert("データベースの認証に失敗しました。");
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("ログイン成功！ UID:", user.uid);
            if (window.startDatabaseSync) {
                window.startDatabaseSync();
            }
        }
    });
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB0FIyWH6HiIBzuMoUcPXBj7Ee9yf6oElU&libraries=places"></script>

    <script src="app_fixed.js"></script>
    
</body>
</html>
