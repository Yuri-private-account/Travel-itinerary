<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旅行のしおり</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

    <div id="map-area">
        <div id="map"></div>
        <div class="map-hint">💡 地図をタップして新しい場所を登録</div>
        <button id="locate-btn" class="locate-button">📍 現在地を表示</button>
    </div>

    <div id="itinerary-area">
        <div class="area-header">
            <span>旅の予定</span>
            <button id="sync-btn" class="sync-button">🔄 リアルタイム同期中</button>
        </div>
        <ul id="itinerary-list"></ul>
    </div>

    <div id="bottom-sheet" class="hidden">
        <div class="sheet-handle"></div>
        <button id="close-sheet">閉じる</button>
        <div class="sheet-content">
            <label>スポット名</label>
            <input type="text" id="edit-title" class="form-input">
            <label>滞在時間（時間）</label>
            <input type="number" id="edit-duration" class="form-input" step="0.5" min="0.5">
            <label>ブロックの色（18色）</label>
            <div id="color-picker" class="color-picker"></div>
            <div class="cost-box">
                <h3>💰 費用の概算とメモ</h3>
                <p id="sheet-cost" class="price"></p>
                <textarea id="edit-memo" class="form-textarea" rows="3" placeholder="メモを自由に入力"></textarea>
            </div>
            <button id="save-spot-btn" class="primary-btn">内容を保存</button>
            <button id="delete-spot-btn" class="danger-btn">この予定を削除</button>
        </div>
    </div>
    <div id="overlay" class="hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
        }
    }
    </script>

    <script type="module">
    import { initializeApp } from "firebase/app";
    import { getDatabase, ref, set, onValue } from "firebase/database";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";

    // ★ここにFirebaseコンソールからコピーした設定を貼り付けてください★
    const firebaseConfig = {
        apiKey: "AIzaSyCGoGzGK1xPZf2QY6si3qvO2k9yNnkGx_o",
        authDomain: "yows-1st-database.firebaseapp.com",
        databaseURL: "https://yows-1st-database-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "yows-1st-database",
        storageBucket: "yows-1st-database.firebasestorage.app",
        messagingSenderId: "162209423635",
        appId: "1:162209423635:web:0f3e78ed371464d289fae6",
    };

    // 初期化
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // app.jsで使えるようにグローバル変数に公開
    window.fbDB = db;
    window.fbRef = ref;
    window.fbSet = set;
    window.fbOnValue = onValue;

    // サイトを開いたら自動で匿名ログインを実行
    signInAnonymously(auth).catch((error) => {
        console.error("認証エラー:", error);
        alert("データベースの認証に失敗しました。");
    });

    // ログイン状態を監視し、成功したら同期を開始する
    onAuthStateChanged(auth, (user) => {
        if (user) {
            console.log("ログイン成功！ UID:", user.uid);
            // app.js 内に定義した同期開始関数を呼び出す
            if (window.startDatabaseSync) {
                window.startDatabaseSync();
            }
        }
    });
    </script>

    <script src="app.js"></script>
</body>
</html>
